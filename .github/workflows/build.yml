name: Build

on:
  push:
    tags: '*'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      fail-fast: false

      # Set up a matrix to run the configurations
      matrix:
        os: [windows-latest]
        build_type: [Release]
        include:
          - os: windows-latest
            configure_options: -G "Visual Studio 17 2022" -A x64 -T ClangCL
            project_name: Inharmonic.vst3
            artifact_name: Inharmonic_vst3_windows_x64.zip

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: >
          cmake
          -S .
          -B build
          ${{ matrix.configure_options }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build with CMake
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Create artifacts
        shell: bash
        run: |
          ls  '${{github.workspace}}/build'
          if [[ "${{ matrix.os }}" == "windows-latest" ]]
          then
            mkdir -p '${{github.workspace}}/package'
            cp -R '${{github.workspace}}/build/VST3/${{ matrix.build_type }}/${{ matrix.project_name }}' '${{github.workspace}}/package/'
            cp -R '${{github.workspace}}/VST3 Presets' '${{github.workspace}}/package/'
            cd '${{github.workspace}}/package'
            7z a '${{github.workspace}}/${{ matrix.artifact_name }}' *
          fi
          ls

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.artifact_name }}
